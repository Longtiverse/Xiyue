<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>习乐 Xiyue — UX 改进建议审阅</title>
<style>
/* ===== Reset & Base ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap');

:root {
  --bg-primary: #111615;
  --bg-card: #1a201e;
  --bg-card-hover: #1f2724;
  --bg-input: #151b19;
  --border-subtle: #2a3330;
  --border-card: #243129;
  --text-primary: #e8ede9;
  --text-secondary: #8fa89a;
  --text-muted: #5a7068;
  --accent-teal: #73d3b5;
  --accent-teal-dim: rgba(115, 211, 181, 0.15);
  --accent-teal-glow: rgba(115, 211, 181, 0.08);
  --accent-gold: #c9a76a;
  --accent-gold-dim: rgba(201, 167, 106, 0.15);
  --priority-must: #e06c6c;
  --priority-must-bg: rgba(224, 108, 108, 0.12);
  --priority-want: #73d3b5;
  --priority-want-bg: rgba(115, 211, 181, 0.12);
  --priority-later: #c9a76a;
  --priority-later-bg: rgba(201, 167, 106, 0.12);
  --priority-no: #6a7a74;
  --priority-no-bg: rgba(106, 122, 116, 0.10);
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 16px;
  --radius-pill: 100px;
  --shadow-card: 0 2px 12px rgba(0,0,0,0.3);
  --transition: 0.2s ease;
}

html {
  scroll-behavior: smooth;
  scrollbar-width: thin;
  scrollbar-color: var(--border-subtle) var(--bg-primary);
}

body {
  font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.6;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ===== Scrollbar ===== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-primary); }
::-webkit-scrollbar-thumb { background: var(--border-subtle); border-radius: 3px; }

/* ===== Top Progress Bar ===== */
#progress-bar-container {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 1000;
  background: var(--bg-primary);
  border-bottom: 1px solid var(--border-subtle);
  padding: 12px 24px;
  backdrop-filter: blur(12px);
  display: flex;
  align-items: center;
  gap: 16px;
}

#progress-bar-container .progress-label {
  font-size: 13px;
  color: var(--text-secondary);
  white-space: nowrap;
  min-width: 80px;
}

#progress-bar-container .progress-label strong {
  color: var(--accent-teal);
  font-weight: 600;
}

#progress-track {
  flex: 1;
  height: 6px;
  background: var(--border-subtle);
  border-radius: 3px;
  overflow: hidden;
}

#progress-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--accent-teal), var(--accent-gold));
  border-radius: 3px;
  transition: width 0.4s ease;
}

/* ===== Page Header ===== */
.page-header {
  text-align: center;
  padding: 80px 24px 32px;
}

.page-header h1 {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, var(--accent-teal), var(--accent-gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
}

.page-header p {
  font-size: 14px;
  color: var(--text-muted);
}

/* ===== Navigation ===== */
.category-nav {
  position: sticky;
  top: 46px;
  z-index: 900;
  background: rgba(17, 22, 21, 0.92);
  backdrop-filter: blur(12px);
  padding: 10px 24px;
  display: flex;
  gap: 8px;
  overflow-x: auto;
  border-bottom: 1px solid var(--border-subtle);
  scrollbar-width: none;
}

.category-nav::-webkit-scrollbar { display: none; }

.category-nav a {
  flex-shrink: 0;
  padding: 6px 14px;
  font-size: 12px;
  color: var(--text-muted);
  text-decoration: none;
  border-radius: var(--radius-pill);
  border: 1px solid transparent;
  transition: var(--transition);
  white-space: nowrap;
}

.category-nav a:hover {
  color: var(--text-secondary);
  border-color: var(--border-subtle);
}

.category-nav a.active {
  color: var(--accent-teal);
  border-color: var(--accent-teal);
  background: var(--accent-teal-dim);
}

/* ===== Main Content ===== */
.main-content {
  max-width: 820px;
  margin: 0 auto;
  padding: 0 20px 120px;
}

/* ===== Category Section ===== */
.category-section {
  margin-top: 40px;
}

.category-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border-subtle);
}

.category-number {
  font-size: 13px;
  font-weight: 600;
  color: var(--accent-gold);
  background: var(--accent-gold-dim);
  padding: 3px 10px;
  border-radius: var(--radius-pill);
}

.category-title {
  font-size: 17px;
  font-weight: 600;
  color: var(--text-primary);
}

.category-count {
  font-size: 12px;
  color: var(--text-muted);
  margin-left: auto;
}

/* ===== Suggestion Card ===== */
.suggestion-card {
  background: var(--bg-card);
  border: 1px solid var(--border-card);
  border-radius: var(--radius-lg);
  padding: 20px;
  margin-bottom: 12px;
  transition: var(--transition);
  position: relative;
}

.suggestion-card:hover {
  background: var(--bg-card-hover);
  border-color: var(--border-subtle);
}

.suggestion-card.reviewed {
  border-left: 3px solid var(--accent-teal);
}

.suggestion-card.reviewed.priority-must {
  border-left-color: var(--priority-must);
}

.suggestion-card.reviewed.priority-want {
  border-left-color: var(--priority-want);
}

.suggestion-card.reviewed.priority-later {
  border-left-color: var(--priority-later);
}

.suggestion-card.reviewed.priority-no {
  border-left-color: var(--priority-no);
}

.suggestion-top {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 8px;
}

.suggestion-number {
  font-size: 13px;
  font-weight: 700;
  color: var(--accent-teal);
  background: var(--accent-teal-dim);
  min-width: 32px;
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius-sm);
  flex-shrink: 0;
  margin-top: 2px;
}

.suggestion-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text-primary);
  line-height: 1.5;
}

.suggestion-desc {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.7;
  margin-bottom: 14px;
  padding-left: 44px;
}

/* Priority Buttons */
.priority-row {
  display: flex;
  gap: 8px;
  padding-left: 44px;
  flex-wrap: wrap;
}

.priority-btn {
  font-family: inherit;
  font-size: 12px;
  font-weight: 500;
  padding: 5px 14px;
  border-radius: var(--radius-pill);
  border: 1px solid var(--border-subtle);
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  transition: var(--transition);
  outline: none;
}

.priority-btn:hover {
  border-color: var(--text-muted);
  color: var(--text-secondary);
}

.priority-btn.selected {
  font-weight: 600;
}

.priority-btn[data-priority="must"].selected {
  background: var(--priority-must-bg);
  border-color: var(--priority-must);
  color: var(--priority-must);
}

.priority-btn[data-priority="want"].selected {
  background: var(--priority-want-bg);
  border-color: var(--priority-want);
  color: var(--priority-want);
}

.priority-btn[data-priority="later"].selected {
  background: var(--priority-later-bg);
  border-color: var(--priority-later);
  color: var(--priority-later);
}

.priority-btn[data-priority="no"].selected {
  background: var(--priority-no-bg);
  border-color: var(--priority-no);
  color: var(--priority-no);
}

/* Note Toggle & Textarea */
.note-toggle {
  font-family: inherit;
  font-size: 12px;
  color: var(--text-muted);
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px 8px;
  margin-left: auto;
  transition: var(--transition);
}

.note-toggle:hover { color: var(--text-secondary); }

.note-area {
  margin-top: 10px;
  padding-left: 44px;
  display: none;
}

.note-area.visible { display: block; }

.note-area textarea {
  width: 100%;
  min-height: 60px;
  background: var(--bg-input);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  color: var(--text-primary);
  font-family: inherit;
  font-size: 13px;
  padding: 10px 12px;
  resize: vertical;
  outline: none;
  transition: var(--transition);
  line-height: 1.5;
}

.note-area textarea:focus {
  border-color: var(--accent-teal);
  box-shadow: 0 0 0 2px var(--accent-teal-glow);
}

.note-area textarea::placeholder {
  color: var(--text-muted);
}

/* ===== Floating Summary Panel ===== */
#summary-panel {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 1000;
  background: var(--bg-card);
  border: 1px solid var(--border-card);
  border-radius: var(--radius-lg);
  padding: 16px 20px;
  min-width: 180px;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
}

#summary-panel h3 {
  font-size: 12px;
  color: var(--text-muted);
  font-weight: 500;
  margin-bottom: 10px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.summary-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 4px 0;
  font-size: 13px;
}

.summary-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  margin-right: 8px;
  flex-shrink: 0;
}

.summary-dot.must { background: var(--priority-must); }
.summary-dot.want { background: var(--priority-want); }
.summary-dot.later { background: var(--priority-later); }
.summary-dot.no { background: var(--priority-no); }

.summary-label {
  display: flex;
  align-items: center;
  color: var(--text-secondary);
}

.summary-count {
  font-weight: 600;
  color: var(--text-primary);
  min-width: 20px;
  text-align: right;
}

.summary-divider {
  height: 1px;
  background: var(--border-subtle);
  margin: 10px 0;
}

#export-btn {
  width: 100%;
  padding: 8px 0;
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  color: var(--bg-primary);
  background: linear-gradient(135deg, var(--accent-teal), #5bc4a0);
  border: none;
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: var(--transition);
  margin-top: 4px;
}

#export-btn:hover {
  opacity: 0.9;
  transform: translateY(-1px);
}

#export-btn:active {
  transform: translateY(0);
}

/* ===== Responsive ===== */
@media (max-width: 640px) {
  .page-header { padding: 70px 16px 24px; }
  .page-header h1 { font-size: 22px; }
  .main-content { padding: 0 12px 120px; }
  .suggestion-card { padding: 16px; }
  .suggestion-desc { padding-left: 0; }
  .priority-row { padding-left: 0; }
  .note-area { padding-left: 0; }
  #summary-panel { right: 12px; bottom: 12px; min-width: 160px; }
  .category-nav { padding: 8px 12px; }
}

/* ===== Fade-in animation ===== */
.suggestion-card {
  opacity: 0;
  transform: translateY(8px);
  animation: fadeInUp 0.3s ease forwards;
}

@keyframes fadeInUp {
  to { opacity: 1; transform: translateY(0); }
}

/* Stagger: set via JS with animation-delay */

/* ===== Toast ===== */
#toast {
  position: fixed;
  top: 60px;
  left: 50%;
  transform: translateX(-50%) translateY(-20px);
  background: var(--bg-card);
  border: 1px solid var(--accent-teal);
  color: var(--accent-teal);
  padding: 8px 20px;
  border-radius: var(--radius-pill);
  font-size: 13px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s, transform 0.3s;
  z-index: 2000;
}

#toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
</style>
</head>
<body>

<!-- Progress Bar -->
<div id="progress-bar-container">
  <span class="progress-label">已审阅 <strong id="progress-count">0</strong>/50</span>
  <div id="progress-track"><div id="progress-fill"></div></div>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Page Header -->
<div class="page-header">
  <h1>习乐 UX 改进建议</h1>
  <p>共 50 条建议，分 10 个类别 — 逐条选择优先级并添加备注</p>
</div>

<!-- Category Navigation -->
<nav class="category-nav" id="category-nav"></nav>

<!-- Main Content -->
<div class="main-content" id="main-content"></div>

<!-- Floating Summary -->
<div id="summary-panel">
  <h3>审阅摘要</h3>
  <div class="summary-row">
    <span class="summary-label"><span class="summary-dot must"></span>必须做</span>
    <span class="summary-count" id="count-must">0</span>
  </div>
  <div class="summary-row">
    <span class="summary-label"><span class="summary-dot want"></span>想做</span>
    <span class="summary-count" id="count-want">0</span>
  </div>
  <div class="summary-row">
    <span class="summary-label"><span class="summary-dot later"></span>以后再说</span>
    <span class="summary-count" id="count-later">0</span>
  </div>
  <div class="summary-row">
    <span class="summary-label"><span class="summary-dot no"></span>不需要</span>
    <span class="summary-count" id="count-no">0</span>
  </div>
  <div class="summary-divider"></div>
  <button id="export-btn">导出结果</button>
</div>

<!-- JS will be added in subsequent steps -->
<script>
// ===== STEP 2: Suggestion Data =====
const CATEGORIES = [
  { id: 'cat1', label: '一、首次体验（新用户 0-5 分钟）', items: [
    { num: 1, title: '首次引导流程', desc: '用户第一次打开 app 看到一堆控件不知道先做什么。需要极简引导：选音阶→选根音→点播放，10 秒内听到声音。' },
    { num: 2, title: '默认状态应直接可播放', desc: '首次打开时播放按钮有呼吸动画或文案暗示"点我试试"，让用户自然被吸引。' },
    { num: 3, title: '一句话说明', desc: '首次启动用一句话告诉用户："选择音阶或和弦，随时随地跟着练习"。' },
    { num: 4, title: '曲库列表对新手不友好', desc: '"Dorian"、"Mixolydian" 新用户完全不懂。列表卡片应直接显示中文描述。' },
    { num: 5, title: '难度分级未体现在 UI', desc: 'library.json 有 difficulty 但列表完全没展示。建议用颜色或星级标记，默认只展示初/中级。' },
  ]},
  { id: 'cat2', label: '二、核心练习流程', items: [
    { num: 6, title: '选完音阶没有音频预览', desc: '点选音阶后自动播放 2-3 秒上行片段，让用户"先听再决定"。' },
    { num: 7, title: '根音切换没有关联提示', desc: '切换根音时键盘预览应立即更新高亮，直观看到音阶分布变化。' },
    { num: 8, title: '播放时无法调 BPM', desc: '播放中控制区变只读，但"感觉太快想慢点"是最常见需求。应允许实时调整。' },
    { num: 9, title: '播放中不能切换方向', desc: '正在练上行突然想切上下行，必须停止才能改。应支持热切换。' },
    { num: 10, title: '没有节拍器视觉提示', desc: '播放时只有文字变化，缺少节奏感视觉反馈。屏幕边缘脉冲光效或按钮随节拍呼吸。' },
    { num: 11, title: '播放前缺少预备拍', desc: 'CountdownBeep 代码存在但未连接到主流程。练习中预备拍至关重要，建议默认开启 2 拍。' },
    { num: 12, title: '循环没有次数选项', desc: '只有开/关，常见需求是"循环 5 遍自动停"。增加次数选项：无限/3/5/10 次。' },
    { num: 13, title: '没有渐进速度模式', desc: '从慢速开始每轮自动加速（60 BPM 起，每轮 +5）。AdaptiveSpeedController 已存在但未连接。' },
  ]},
  { id: 'cat3', label: '三、键盘预览', items: [
    { num: 14, title: '键盘太小难以辨认', desc: '12 键挤在手机宽度内。支持双指缩放或横屏大键盘。' },
    { num: 15, title: '键盘没有触摸交互', desc: '看到钢琴键就想点，但目前纯展示。让用户点击琴键发声变成迷你钢琴。' },
    { num: 16, title: '非播放时键盘价值低', desc: '不播放时只显示"waiting"，浪费空间。应显示当前音阶全部音符高亮。' },
    { num: 17, title: '和弦键盘预览不够直观', desc: '齐奏时所有音同时高亮，看不出叠加关系。用不同深度颜色区分根/三/五/七音。' },
  ]},
  { id: 'cat4', label: '四、音频与音色', items: [
    { num: 18, title: '三种音色差异不明显', desc: '增加更有辨识度的音色，或切换时自动弹一个和弦 demo 让用户听区别。' },
    { num: 19, title: '没有静音模式', desc: '有时只想看键盘默练不要声音，在公共场合尤其需要。' },
    { num: 20, title: '没有音量控制', desc: 'volumeFactor 代码存在但无 UI。加音量滑块或响/中/轻三档。' },
    { num: 21, title: 'Solfege 模式体验不完整', desc: '只改变音高映射，没有实际唱名语音。至少在 UI 中解释这个模式作用。' },
  ]},
  { id: 'cat5', label: '五、收藏与曲库管理', items: [
    { num: 22, title: '收藏操作路径太深', desc: '长按弹菜单才能收藏。应在每个列表项直接显示心形图标一键收藏。' },
    { num: 23, title: '没有最近练习记录', desc: '代码维护了 recentIds 但 UI 无"最近练习"区域。首页加"上次：Db Dorian·80BPM·继续"。' },
    { num: 24, title: '曲库无快速定位', desc: '50 个条目横向滚动找东西费劲。加字母索引或按类别分组显示。' },
    { num: 25, title: '收藏页太简陋', desc: '只有列表和空状态。支持拖拽排序和"一键开始练习"按钮。' },
  ]},
  { id: 'cat6', label: '六、学习与进度', items: [
    { num: 26, title: '完全没有练习统计', desc: '练了一周不知道花了多少时间。展示今日/本周时长、次数、top 5 项目。' },
    { num: 27, title: '没有成就激励', desc: '26 个成就已定义但未连接 UI。完成时弹 toast "恭喜练习满 1 小时"就能提升黏性。' },
    { num: 28, title: '没有练习提醒', desc: '支持每日目标（如 15 分钟）和温和提醒，帮助养成习惯。' },
    { num: 29, title: '没有难度递进路径', desc: '用户不知道练完 Major 该练什么。提供推荐路径。' },
    { num: 30, title: '无法标记已掌握', desc: '用户想知道哪些"过关了"。支持标记状态并在列表显示进度。' },
  ]},
  { id: 'cat7', label: '七、交互细节', items: [
    { num: 31, title: 'BPM 精度不够', desc: '预设只有 7 个值，想要 66 或 108 没办法。加 +/- 微调或精确输入。' },
    { num: 32, title: '八度被硬编码为 4', desc: '吉他手想 E2，小提琴手想 G3。增加八度选择器。' },
    { num: 33, title: '暂停恢复缺位置提示', desc: '恢复时先闪烁高亮当前音符 1 秒再继续。' },
    { num: 34, title: '没有"回到上一步"', desc: '想退回重听一下没办法。支持左滑或点击序列音符跳转。' },
    { num: 35, title: '长按停止太隐蔽', desc: '新用户不知道，反复点导致暂停恢复循环。首次使用气泡提示或加显式停止小图标。' },
  ]},
  { id: 'cat8', label: '八、视觉与体验打磨', items: [
    { num: 36, title: '播放/非播放界面跳跃大', desc: 'Ready→Playing 控制区瞬间切换。用更平滑过渡动画。' },
    { num: 37, title: '深色主题白键对比度不足', desc: '给白键加描边或阴影增强辨识。' },
    { num: 38, title: '播放序列 chips 太小', desc: '8+ 个音符横排很窄。支持自动换行或可滚动。' },
    { num: 39, title: '当前音符视觉强调不够', desc: '金色标记在一排 chips 中不突出。加放大动画或发光效果。' },
    { num: 40, title: '没有横屏支持', desc: '横屏键盘更大更有用，对平板尤其重要。' },
  ]},
  { id: 'cat9', label: '九、和弦特有体验', items: [
    { num: 41, title: '齐奏持续时间不灵活', desc: '快速 BPM 时和弦听不清，慢速时等太久。和弦 Block 时长应独立控制。' },
    { num: 42, title: '琶音+齐奏行为没解释', desc: '选这个模式不知道会发生什么。加一行小字说明播放顺序。' },
    { num: 43, title: '没有和弦转位', desc: '只有原位，实际常用第一/第二转位。增加转位选项。' },
    { num: 44, title: 'Combo 页面按钮不可用', desc: '播放按钮禁用，用户困惑。要么实现要么暂时隐藏 tab。' },
  ]},
  { id: 'cat10', label: '十、更广泛的用户场景', items: [
    { num: 45, title: '后台播放控制不完整', desc: '确保锁屏控制完整：播放/暂停/停止/上下步。' },
    { num: 46, title: '没有分享功能', desc: '生成练习卡片图片或链接分享给老师/朋友。' },
    { num: 47, title: '无外部同步', desc: '进阶用户想与外部节拍器/DAW 同步（MIDI clock）。远期规划。' },
    { num: 48, title: '不支持自定义音阶', desc: '用户无法添加特殊调式。Combo 页面部分解决但不完整。' },
    { num: 49, title: '没有教学内容', desc: '"Phrygian Dominant"不知道是什么。每个项目加"了解更多"入口展示中文描述。' },
    { num: 50, title: '缺少"今日推荐"', desc: '每次打开相同界面缺新鲜感。基于历史推荐未练过的项目。' },
  ]},
];

const PRIORITIES = [
  { key: 'must', label: '必须做' },
  { key: 'want', label: '想做' },
  { key: 'later', label: '以后再说' },
  { key: 'no', label: '不需要' },
];

// ===== STEP 3: Rendering =====
const navEl = document.getElementById('category-nav');
const mainEl = document.getElementById('main-content');

function renderAll() {
  navEl.innerHTML = '';
  mainEl.innerHTML = '';
  let cardIndex = 0;

  CATEGORIES.forEach((cat) => {
    // Nav link
    const a = document.createElement('a');
    a.href = '#' + cat.id;
    a.textContent = cat.label.split('、')[0] + '、' + cat.label.split('、')[1]?.split('（')[0]?.trim();
    navEl.appendChild(a);

    // Section
    const section = document.createElement('div');
    section.className = 'category-section';
    section.id = cat.id;

    const header = document.createElement('div');
    header.className = 'category-header';
    const numSpan = document.createElement('span');
    numSpan.className = 'category-number';
    numSpan.textContent = cat.label.split('、')[0];
    const titleSpan = document.createElement('span');
    titleSpan.className = 'category-title';
    titleSpan.textContent = cat.label.split('、').slice(1).join('、');
    const countSpan = document.createElement('span');
    countSpan.className = 'category-count';
    countSpan.id = 'cat-count-' + cat.id;
    countSpan.textContent = '0/' + cat.items.length;
    header.appendChild(numSpan);
    header.appendChild(titleSpan);
    header.appendChild(countSpan);
    section.appendChild(header);

    cat.items.forEach((item) => {
      const card = document.createElement('div');
      card.className = 'suggestion-card';
      card.id = 'item-' + item.num;
      card.style.animationDelay = (cardIndex * 0.03) + 's';
      cardIndex++;

      // Top row
      const topRow = document.createElement('div');
      topRow.className = 'suggestion-top';
      const numBadge = document.createElement('span');
      numBadge.className = 'suggestion-number';
      numBadge.textContent = item.num;
      const titleEl = document.createElement('span');
      titleEl.className = 'suggestion-title';
      titleEl.textContent = item.title;
      topRow.appendChild(numBadge);
      topRow.appendChild(titleEl);

      // Note toggle in top row
      const noteBtn = document.createElement('button');
      noteBtn.className = 'note-toggle';
      noteBtn.textContent = '+ 备注';
      noteBtn.dataset.num = item.num;
      topRow.appendChild(noteBtn);

      card.appendChild(topRow);

      // Description
      const descEl = document.createElement('div');
      descEl.className = 'suggestion-desc';
      descEl.textContent = item.desc;
      card.appendChild(descEl);

      // Priority buttons
      const prioRow = document.createElement('div');
      prioRow.className = 'priority-row';
      PRIORITIES.forEach((p) => {
        const btn = document.createElement('button');
        btn.className = 'priority-btn';
        btn.dataset.priority = p.key;
        btn.dataset.num = item.num;
        btn.textContent = p.label;
        prioRow.appendChild(btn);
      });
      card.appendChild(prioRow);

      // Note area (hidden by default)
      const noteArea = document.createElement('div');
      noteArea.className = 'note-area';
      noteArea.id = 'note-area-' + item.num;
      const textarea = document.createElement('textarea');
      textarea.placeholder = '添加备注或想法...';
      textarea.dataset.num = item.num;
      noteArea.appendChild(textarea);
      card.appendChild(noteArea);

      section.appendChild(card);
    });

    mainEl.appendChild(section);
  });
}

renderAll();

// ===== STEP 4: Interactivity (priority, notes, localStorage) =====
const STORAGE_KEY = 'xiyue-ux-review';

// Load saved state
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch { return {}; }
}

function saveState(state) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch {}
}

let state = loadState(); // { "1": { priority: "must", note: "..." }, ... }

// Restore saved state to UI
function restoreUI() {
  for (const [num, data] of Object.entries(state)) {
    if (data.priority) {
      const card = document.getElementById('item-' + num);
      if (!card) continue;
      card.classList.add('reviewed', 'priority-' + data.priority);
      const btn = card.querySelector(`.priority-btn[data-priority="${data.priority}"]`);
      if (btn) btn.classList.add('selected');
    }
    if (data.note) {
      const textarea = document.querySelector(`#note-area-${num} textarea`);
      if (textarea) {
        textarea.value = data.note;
        document.getElementById('note-area-' + num)?.classList.add('visible');
        const toggleBtn = document.querySelector(`.note-toggle[data-num="${num}"]`);
        if (toggleBtn) toggleBtn.textContent = '备注';
      }
    }
  }
}

// Priority button clicks
document.addEventListener('click', (e) => {
  const btn = e.target.closest('.priority-btn');
  if (!btn) return;

  const num = btn.dataset.num;
  const priority = btn.dataset.priority;
  const card = document.getElementById('item-' + num);

  // Deselect all in same card
  card.querySelectorAll('.priority-btn').forEach(b => b.classList.remove('selected'));
  // Remove old priority classes
  card.classList.remove('priority-must', 'priority-want', 'priority-later', 'priority-no');

  // Toggle: if same priority clicked again, unset
  if (state[num]?.priority === priority) {
    card.classList.remove('reviewed');
    if (!state[num]) state[num] = {};
    state[num].priority = null;
  } else {
    btn.classList.add('selected');
    card.classList.add('reviewed', 'priority-' + priority);
    if (!state[num]) state[num] = {};
    state[num].priority = priority;
  }

  saveState(state);
  updateSummary();
});

// Note toggle
document.addEventListener('click', (e) => {
  const toggle = e.target.closest('.note-toggle');
  if (!toggle) return;
  const num = toggle.dataset.num;
  const area = document.getElementById('note-area-' + num);
  if (area) {
    area.classList.toggle('visible');
    if (area.classList.contains('visible')) {
      toggle.textContent = '备注';
      area.querySelector('textarea')?.focus();
    } else {
      toggle.textContent = '+ 备注';
    }
  }
});

// Note textarea save on input
document.addEventListener('input', (e) => {
  if (e.target.tagName === 'TEXTAREA' && e.target.dataset.num) {
    const num = e.target.dataset.num;
    if (!state[num]) state[num] = {};
    state[num].note = e.target.value;
    saveState(state);
  }
});

restoreUI();

// ===== STEP 5: Progress bar, summary counts, export =====
function updateSummary() {
  let counts = { must: 0, want: 0, later: 0, no: 0 };
  let reviewed = 0;

  for (const data of Object.values(state)) {
    if (data.priority && counts.hasOwnProperty(data.priority)) {
      counts[data.priority]++;
      reviewed++;
    }
  }

  document.getElementById('count-must').textContent = counts.must;
  document.getElementById('count-want').textContent = counts.want;
  document.getElementById('count-later').textContent = counts.later;
  document.getElementById('count-no').textContent = counts.no;
  document.getElementById('progress-count').textContent = reviewed;
  document.getElementById('progress-fill').style.width = (reviewed / 50 * 100) + '%';

  // Update per-category counts
  CATEGORIES.forEach(cat => {
    const catReviewed = cat.items.filter(item => state[item.num]?.priority).length;
    const el = document.getElementById('cat-count-' + cat.id);
    if (el) el.textContent = catReviewed + '/' + cat.items.length;
  });
}

updateSummary();

// Scroll spy for nav highlighting
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    const link = navEl.querySelector(`a[href="#${entry.target.id}"]`);
    if (link) {
      if (entry.isIntersecting) {
        navEl.querySelectorAll('a').forEach(a => a.classList.remove('active'));
        link.classList.add('active');
      }
    }
  });
}, { rootMargin: '-80px 0px -70% 0px' });

CATEGORIES.forEach(cat => {
  const section = document.getElementById(cat.id);
  if (section) observer.observe(section);
});

// Export to Markdown
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

const PRIORITY_LABELS = { must: '必须做', want: '想做', later: '以后再说', no: '不需要' };
const PRIORITY_EMOJI = { must: '🔴', want: '🟢', later: '🟡', no: '⚪' };

document.getElementById('export-btn').addEventListener('click', () => {
  let md = '# 习乐 UX 改进建议 — 审阅结果\n\n';
  md += `导出时间：${new Date().toLocaleString('zh-CN')}\n\n`;

  // Summary
  let counts = { must: 0, want: 0, later: 0, no: 0, unreviewed: 0 };
  const allItems = CATEGORIES.flatMap(c => c.items);
  allItems.forEach(item => {
    const p = state[item.num]?.priority;
    if (p && counts.hasOwnProperty(p)) counts[p]++;
    else counts.unreviewed++;
  });
  md += '## 摘要\n\n';
  md += `| 优先级 | 数量 |\n|--------|------|\n`;
  md += `| 🔴 必须做 | ${counts.must} |\n`;
  md += `| 🟢 想做 | ${counts.want} |\n`;
  md += `| 🟡 以后再说 | ${counts.later} |\n`;
  md += `| ⚪ 不需要 | ${counts.no} |\n`;
  md += `| ⬜ 未审阅 | ${counts.unreviewed} |\n\n`;

  // Per-priority grouped lists
  for (const pKey of ['must', 'want', 'later', 'no']) {
    const items = allItems.filter(item => state[item.num]?.priority === pKey);
    if (items.length === 0) continue;
    md += `## ${PRIORITY_EMOJI[pKey]} ${PRIORITY_LABELS[pKey]}（${items.length} 条）\n\n`;
    items.forEach(item => {
      const note = state[item.num]?.note?.trim();
      md += `- **#${item.num} ${item.title}**：${item.desc}`;
      if (note) md += `\n  - 💬 备注：${note}`;
      md += '\n';
    });
    md += '\n';
  }

  // Unreviewed
  const unreviewed = allItems.filter(item => !state[item.num]?.priority);
  if (unreviewed.length > 0) {
    md += `## ⬜ 未审阅（${unreviewed.length} 条）\n\n`;
    unreviewed.forEach(item => {
      md += `- #${item.num} ${item.title}\n`;
    });
    md += '\n';
  }

  // Copy to clipboard
  navigator.clipboard.writeText(md).then(() => {
    showToast('已复制到剪贴板！可粘贴到任意文档');
  }).catch(() => {
    // Fallback: download as file
    const blob = new Blob([md], { type: 'text/markdown' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'xiyue-ux-review-result.md';
    a.click();
    URL.revokeObjectURL(url);
    showToast('已下载 Markdown 文件');
  });
});
</script>
