<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>习乐 Xiyue — App Icon 方案选择</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0e1210;
  --bg-card: #161c19;
  --bg-card-hover: #1c2420;
  --bg-selected: #1a2b24;
  --border: #243129;
  --border-hover: #35453d;
  --border-selected: #73d3b5;
  --text: #e4ebe7;
  --text-secondary: #8fa89a;
  --text-muted: #5a7068;
  --accent: #73d3b5;
  --accent-dim: rgba(115, 211, 181, 0.12);
  --gold: #c9a76a;
  --gold-dim: rgba(201, 167, 106, 0.12);
  --radius: 16px;
  --radius-sm: 10px;
  --transition: 0.25s ease;
}

html { scroll-behavior: smooth; }
body {
  font-family: 'Noto Sans SC', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* Header */
.page-header {
  text-align: center;
  padding: 48px 24px 20px;
}
.page-header h1 {
  font-size: 26px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent), var(--gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
}
.page-header p {
  font-size: 14px;
  color: var(--text-muted);
  max-width: 460px;
  margin: 0 auto;
  line-height: 1.6;
}

/* Current icon section */
.current-section {
  text-align: center;
  padding: 16px 24px 32px;
}
.current-label {
  font-size: 12px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 12px;
}
.current-icon-wrap {
  display: inline-block;
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 3px;
  background: var(--bg-card);
}
.current-icon-wrap svg {
  display: block;
  border-radius: 22px;
}

/* Grid */
.grid-container {
  max-width: 960px;
  margin: 0 auto;
  padding: 0 20px 100px;
}
.grid-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 20px;
  padding-left: 4px;
}
.icon-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 16px;
}

/* Card */
.icon-card {
  background: var(--bg-card);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  cursor: pointer;
  transition: var(--transition);
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.icon-card:hover {
  background: var(--bg-card-hover);
  border-color: var(--border-hover);
  transform: translateY(-2px);
}
.icon-card.selected {
  background: var(--bg-selected);
  border-color: var(--border-selected);
  box-shadow: 0 0 24px rgba(115, 211, 181, 0.08);
}
.icon-card.selected::after {
  content: '✓';
  position: absolute;
  top: 10px;
  right: 12px;
  width: 22px;
  height: 22px;
  background: var(--accent);
  color: var(--bg);
  border-radius: 50%;
  font-size: 12px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Icon display */
.icon-preview {
  width: 120px;
  height: 120px;
  border-radius: 26px;
  overflow: hidden;
  margin-bottom: 16px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  flex-shrink: 0;
}
.icon-preview svg {
  display: block;
  width: 100%;
  height: 100%;
}

/* Card info */
.icon-number {
  font-size: 11px;
  font-weight: 600;
  color: var(--accent);
  background: var(--accent-dim);
  padding: 2px 10px;
  border-radius: 100px;
  margin-bottom: 8px;
}
.icon-name {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 4px;
  text-align: center;
}
.icon-desc {
  font-size: 12px;
  color: var(--text-muted);
  text-align: center;
  line-height: 1.5;
}
.icon-tags {
  display: flex;
  gap: 6px;
  margin-top: 10px;
  flex-wrap: wrap;
  justify-content: center;
}
.icon-tag {
  font-size: 10px;
  color: var(--text-secondary);
  background: rgba(255,255,255,0.04);
  padding: 2px 8px;
  border-radius: 100px;
  border: 1px solid rgba(255,255,255,0.06);
}

/* Bottom bar */
#bottom-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(14, 18, 16, 0.95);
  backdrop-filter: blur(12px);
  border-top: 1px solid var(--border);
  padding: 12px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  z-index: 100;
  transform: translateY(100%);
  transition: transform 0.3s ease;
}
#bottom-bar.visible {
  transform: translateY(0);
}
#bottom-bar .selected-info {
  font-size: 13px;
  color: var(--text-secondary);
}
#bottom-bar .selected-info strong {
  color: var(--accent);
}
#export-btn {
  padding: 8px 20px;
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  color: var(--bg);
  background: linear-gradient(135deg, var(--accent), #5bc4a0);
  border: none;
  border-radius: 100px;
  cursor: pointer;
  transition: var(--transition);
}
#export-btn:hover { opacity: 0.9; }

/* Toast */
#toast {
  position: fixed;
  top: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(-20px);
  background: var(--bg-card);
  border: 1px solid var(--accent);
  color: var(--accent);
  padding: 8px 20px;
  border-radius: 100px;
  font-size: 13px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s, transform 0.3s;
  z-index: 200;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Size comparison row */
.size-row {
  display: flex;
  gap: 20px;
  align-items: flex-end;
  justify-content: center;
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid rgba(255,255,255,0.04);
}
.size-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
.size-item span {
  font-size: 9px;
  color: var(--text-muted);
}
.size-item .mini-icon {
  border-radius: 8px;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}
.size-item .mini-icon svg { display: block; }

@media (max-width: 600px) {
  .icon-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .icon-card { padding: 16px; }
  .icon-preview { width: 90px; height: 90px; border-radius: 20px; }
  .page-header { padding: 36px 16px 16px; }
  .page-header h1 { font-size: 22px; }
  .size-row { display: none; }
}
</style>
</head>

<div id="toast"></div>

// ===== STEP 3: Rendering =====
// Current icon
document.getElementById('current-icon').innerHTML = CURRENT_SVG;

// Icon grid
const gridEl = document.getElementById('icon-grid');

ICONS.forEach((icon) => {
  const card = document.createElement('div');
  card.className = 'icon-card';
  card.dataset.id = icon.id;

  card.innerHTML = `
    <div class="icon-preview">${icon.svg}</div>
    <span class="icon-number">方案 ${icon.id}</span>
    <div class="icon-name">${icon.name}</div>
    <div class="icon-desc">${icon.desc}</div>
    <div class="icon-tags">${icon.tags.map(t => `<span class="icon-tag">${t}</span>`).join('')}</div>
    <div class="size-row">
      <div class="size-item">
        <div class="mini-icon" style="width:48px;height:48px;border-radius:11px;">${icon.svg}</div>
        <span>48px</span>
      </div>
      <div class="size-item">
        <div class="mini-icon" style="width:32px;height:32px;border-radius:8px;">${icon.svg}</div>
        <span>32px</span>
      </div>
      <div class="size-item">
        <div class="mini-icon" style="width:20px;height:20px;border-radius:5px;">${icon.svg}</div>
        <span>20px</span>
      </div>
    </div>
  `;

  gridEl.appendChild(card);
});

// ===== STEP 4: Interactivity =====
const selectedSet = new Set();
const bottomBar = document.getElementById('bottom-bar');
const countEl = document.getElementById('selected-count');

// Click to select/deselect
gridEl.addEventListener('click', (e) => {
  const card = e.target.closest('.icon-card');
  if (!card) return;
  const id = Number(card.dataset.id);

  if (selectedSet.has(id)) {
    selectedSet.delete(id);
    card.classList.remove('selected');
  } else {
    selectedSet.add(id);
    card.classList.add('selected');
  }

  countEl.textContent = selectedSet.size;
  bottomBar.classList.toggle('visible', selectedSet.size > 0);
});

// Toast
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// Export
document.getElementById('export-btn').addEventListener('click', () => {
  if (selectedSet.size === 0) return;

  const sorted = [...selectedSet].sort((a, b) => a - b);
  let md = '# 习乐 App Icon — 选择结果\n\n';
  md += `导出时间：${new Date().toLocaleString('zh-CN')}\n\n`;
  md += `共选择 ${sorted.length} 个方案：\n\n`;

  sorted.forEach(id => {
    const icon = ICONS.find(ic => ic.id === id);
    md += `- **方案 ${id}：${icon.name}** — ${icon.desc}（${icon.tags.join('、')}）\n`;
  });

  md += '\n---\n\n需要设计师根据选中方案制作高保真版本，输出 PNG（1024x1024）和 Android Adaptive Icon XML。\n';

  navigator.clipboard.writeText(md).then(() => {
    showToast('已复制到剪贴板');
  }).catch(() => {
    const blob = new Blob([md], { type: 'text/markdown' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'xiyue-icon-choice.md';
    a.click();
    URL.revokeObjectURL(url);
    showToast('已下载文件');
  });
});
</script>
