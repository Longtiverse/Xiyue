name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main]

jobs:
  test-js:
    name: Test JavaScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linter
        run: npm run lint
      
      - name: Run tests with coverage
        run: npm run test:coverage
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          flags: javascript
          fail_ci_if_error: false

  test-android:
    name: Test Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Run Android unit tests
        run: npm run test:android
        working-directory: ${{ github.workspace }}

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: [test-js, test-android]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/develop')
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Setup Gradle
        run: |
          mkdir -p .tmp/gradle-dist
          cd .tmp/gradle-dist
          wget -q https://services.gradle.org/distributions/gradle-8.14-bin.zip
          unzip -q gradle-8.14-bin.zip
      
      - name: Build Android APK
        run: |
          export GRADLE_BIN="${{ github.workspace }}/.tmp/gradle-dist/gradle-8.14/bin/gradle"
          chmod +x scripts/build-android.sh
          bash scripts/build-android.sh
      
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: xiyue-android-${{ github.sha }}
          path: builds/android/latest/*.apk
          retention-days: 30
          if-no-files-found: error

  format-check:
    name: Check Code Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Check formatting
        run: npm run format:check
